<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERD — Bimbel Management System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; overflow: hidden; }
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #1e293b; border-bottom: 1px solid #334155;
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
  }
  #toolbar h1 { font-size: 16px; font-weight: 700; color: #a5b4fc; }
  #toolbar span { font-size: 12px; color: #64748b; }
  .btn {
    padding: 6px 14px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: all .2s;
  }
  .btn-reset { background: #312e81; color: #a5b4fc; }
  .btn-reset:hover { background: #4338ca; }
  #canvas-wrap { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
  #canvas-wrap.grabbing { cursor: grabbing; }
  svg#erd { position: absolute; width: 4000px; height: 3000px; }
  .entity { cursor: move; }
  .entity rect {
    rx: 12; stroke-width: 1.5; filter: drop-shadow(0 4px 16px rgba(0,0,0,.5));
  }
  .entity .header { font-size: 13px; font-weight: 700; }
  .entity .field { font-size: 11px; }
  .entity .pk { fill: #fbbf24; font-weight: 700; }
  .entity .fk { fill: #86efac; }
  .entity .type { fill: #94a3b8; font-size: 10px; }
  .rel-line { stroke-width: 1.5; fill: none; stroke-dasharray: none; opacity: 0.6; }
  .rel-label { font-size: 10px; fill: #94a3b8; }
  #legend {
    position: fixed; bottom: 16px; left: 16px; background: #1e293b;
    border: 1px solid #334155; border-radius: 12px; padding: 12px 16px;
    font-size: 11px; line-height: 1.8;
  }
  #legend h4 { color: #a5b4fc; margin-bottom: 6px; font-size: 12px; }
  .lg { display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<div id="toolbar">
  <h1>📊 ERD — Bimbel Management System</h1>
  <span>Drag entity untuk memindahkan · Scroll untuk zoom · Drag canvas untuk navigasi</span>
  <button class="btn btn-reset" onclick="resetView()">Reset View</button>
</div>

<div id="canvas-wrap" id="wrap">
<svg id="erd">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-one" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
  </defs>
  <g id="lines"></g>
  <g id="entities"></g>
</svg>
</div>

<div id="legend">
  <h4>Legenda</h4>
  <div class="lg"><span style="color:#fbbf24">PK</span> Primary Key</div>
  <div class="lg"><span style="color:#86efac">FK</span> Foreign Key</div>
  <div class="lg"><div class="dot" style="background:#818cf8"></div> Relasi 1:N</div>
  <div class="lg"><div class="dot" style="background:#f472b6"></div> Relasi 1:1</div>
  <div class="lg"><div class="dot" style="background:#34d399"></div> Relasi N:M</div>
</div>

<script>
const COLORS = {
  auth:   { header: '#312e81', body: '#1e1b4b', border: '#4338ca', text: '#c7d2fe' },
  master: { header: '#164e63', body: '#082f49', border: '#0891b2', text: '#bae6fd' },
  core:   { header: '#14532d', body: '#052e16', border: '#16a34a', text: '#bbf7d0' },
  txn:    { header: '#7c2d12', body: '#431407', border: '#ea580c', text: '#fed7aa' },
  sched:  { header: '#4c1d95', body: '#2e1065', border: '#7c3aed', text: '#ddd6fe' },
};

// Entity definitions [id, label, colorKey, fields[], x, y]
// fields: [name, type, isPK, isFK]
const ENTITIES = [
  {
    id:'Admin', label:'Admin', color:'auth', x:60, y:100,
    fields:[
      ['id','UUID',true,false],['username','String',false,false],['password','String',false,false],
      ['full_name','String?',false,false],['avatar','String?',false,false],
      ['isActive','Boolean',false,false],['created_at','DateTime',false,false],
    ]
  },
  {
    id:'User', label:'User (Orang Tua)', color:'auth', x:360, y:100,
    fields:[
      ['id','UUID',true,false],['full_name','String',false,false],['email','String',false,false],
      ['password','String',false,false],['telp_no','String?',false,false],
      ['address','String?',false,false],['avatar','String?',false,false],
      ['isActive','Boolean',false,false],['created_at','DateTime',false,false],
    ]
  },
  {
    id:'Branch', label:'Branch (Cabang)', color:'master', x:720, y:100,
    fields:[
      ['id','Int',true,false],['name','String',false,false],
      ['address','Text',false,false],['created_at','DateTime',false,false],
    ]
  },
  {
    id:'Level', label:'Level (Kelas)', color:'master', x:1020, y:100,
    fields:[
      ['id','Int',true,false],['name','String',false,false],
      ['created_at','DateTime',false,false],
    ]
  },
  {
    id:'Program', label:'Program', color:'master', x:1280, y:100,
    fields:[
      ['id','Int',true,false],['name','String',false,false],
      ['description','Text',false,false],['created_at','DateTime',false,false],
    ]
  },
  {
    id:'Student', label:'Student (Siswa)', color:'core', x:400, y:420,
    fields:[
      ['id','Int',true,false],['parentId','UUID',false,true],
      ['branchId','Int',false,true],['levelId','Int',false,true],
      ['fullName','String',false,false],['schoolName','String',false,false],
      ['created_at','DateTime',false,false],
    ]
  },
  {
    id:'ProgramPackage', label:'ProgramPackage', color:'master', x:1050, y:380,
    fields:[
      ['id','Int',true,false],['programId','Int',false,true],
      ['name','String',false,false],['totalMeetings','Int',false,false],
      ['price','Decimal',false,false],['isActive','Boolean',false,false],
    ]
  },
  {
    id:'Transaction', label:'Transaction', color:'txn', x:680, y:650,
    fields:[
      ['id','UUID',true,false],['studentId','Int',false,true],
      ['programPackageId','Int',false,true],['amount','Decimal',false,false],
      ['paymentMethod','Enum',false,false],['paymentStatus','Enum',false,false],
      ['paymentProof','String?',false,false],['verifiedById','UUID?',false,true],
      ['created_at','DateTime',false,false],
    ]
  },
  {
    id:'StudentPackage', label:'StudentPackage', color:'core', x:1050, y:650,
    fields:[
      ['id','Int',true,false],['studentId','Int',false,true],
      ['programPackageId','Int',false,true],['transactionId','UUID',false,true],
      ['totalMeetings','Int',false,false],['remainingMeetings','Int',false,false],
      ['status','Enum',false,false],
    ]
  },
  {
    id:'Teacher', label:'Teacher (Guru)', color:'sched', x:60, y:420,
    fields:[
      ['id','Int',true,false],['fullName','String',false,false],
      ['email','String',false,false],['password','String',false,false],
      ['telpNo','String?',false,false],['avatar','String?',false,false],
      ['isActive','Boolean',false,false],
    ]
  },
  {
    id:'RecurringSchedule', label:'RecurringSchedule', color:'sched', x:60, y:720,
    fields:[
      ['id','Int',true,false],['teacherId','Int',false,true],
      ['programId','Int',false,true],['branchId','Int?',false,true],
      ['dayOfWeek','Int',false,false],['startTime','String',false,false],
      ['endTime','String',false,false],['isActive','Boolean',false,false],
    ]
  },
  {
    id:'LessonSchedule', label:'LessonSchedule', color:'sched', x:400, y:1000,
    fields:[
      ['id','Int',true,false],['teacherId','Int',false,true],
      ['programId','Int',false,true],['branchId','Int?',false,true],
      ['date','DateTime',false,false],['startTime','DateTime',false,false],
      ['endTime','DateTime',false,false],['status','String',false,false],
    ]
  },
  {
    id:'Attendance', label:'Attendance (Absensi)', color:'core', x:750, y:950,
    fields:[
      ['id','Int',true,false],['scheduleId','Int',false,true],
      ['studentId','Int',false,true],['studentPackageId','Int',false,true],
      ['status','String',false,false],['notes','Text?',false,false],
      ['markedAt','DateTime?',false,false],
    ]
  },
  {
    id:'RecurringScheduleStudent', label:'RecurringScheduleStudent', color:'sched', x:60, y:1050,
    fields:[
      ['id','Int',true,false],['recurringScheduleId','Int',false,true],
      ['studentId','Int',false,true],
    ]
  },
  {
    id:'RecurringScheduleLevel', label:'RecurringScheduleLevel', color:'sched', x:360, y:750,
    fields:[
      ['id','Int',true,false],['recurringScheduleId','Int',false,true],
      ['levelId','Int',false,true],
    ]
  },
];

// Relations [fromId, toId, label, color]
const RELATIONS = [
  ['Admin','Transaction','1:N','#818cf8'],
  ['User','Student','1:N','#818cf8'],
  ['Branch','Student','1:N','#818cf8'],
  ['Level','Student','1:N','#818cf8'],
  ['Program','ProgramPackage','1:N','#818cf8'],
  ['Program','RecurringSchedule','1:N','#818cf8'],
  ['Program','LessonSchedule','1:N','#818cf8'],
  ['Student','Transaction','1:N','#818cf8'],
  ['Student','StudentPackage','1:N','#818cf8'],
  ['Student','Attendance','1:N','#818cf8'],
  ['ProgramPackage','Transaction','1:N','#818cf8'],
  ['ProgramPackage','StudentPackage','1:N','#818cf8'],
  ['Transaction','StudentPackage','1:1','#f472b6'],
  ['Teacher','RecurringSchedule','1:N','#818cf8'],
  ['Teacher','LessonSchedule','1:N','#818cf8'],
  ['Branch','RecurringSchedule','1:N','#818cf8'],
  ['Branch','LessonSchedule','1:N','#818cf8'],
  ['RecurringSchedule','RecurringScheduleStudent','1:N','#34d399'],
  ['RecurringSchedule','RecurringScheduleLevel','1:N','#34d399'],
  ['Student','RecurringScheduleStudent','1:N','#34d399'],
  ['Level','RecurringScheduleLevel','1:N','#34d399'],
  ['LessonSchedule','Attendance','1:N','#818cf8'],
  ['StudentPackage','Attendance','1:N','#818cf8'],
];

const FIELD_H = 22, HEADER_H = 36, PADDING = 14, MIN_W = 200;
const entityEls = {};
const entityData = {};

function measureText(text, size=11) { return text.length * (size * 0.6); }

function buildEntity(ent) {
  const w = Math.max(MIN_W, ...ent.fields.map(f => measureText(f[0]+' '+f[1], 11) + 60)) + PADDING*2;
  const h = HEADER_H + ent.fields.length * FIELD_H + 8;
  const c = COLORS[ent.color];

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','entity');
  g.setAttribute('transform',`translate(${ent.x},${ent.y})`);
  g.dataset.id = ent.id;

  // Shadow rect
  const shadow = document.createElementNS('http://www.w3.org/2000/svg','rect');
  shadow.setAttribute('x','4'); shadow.setAttribute('y','4');
  shadow.setAttribute('width',w); shadow.setAttribute('height',h);
  shadow.setAttribute('rx','12'); shadow.setAttribute('fill','rgba(0,0,0,0.4)');
  g.appendChild(shadow);

  // Body
  const body = document.createElementNS('http://www.w3.org/2000/svg','rect');
  body.setAttribute('width',w); body.setAttribute('height',h);
  body.setAttribute('rx','12'); body.setAttribute('fill',c.body);
  body.setAttribute('stroke',c.border);
  g.appendChild(body);

  // Header
  const hdr = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hdr.setAttribute('width',w); hdr.setAttribute('height',HEADER_H);
  hdr.setAttribute('rx','12'); hdr.setAttribute('fill',c.header);
  hdr.setAttribute('stroke',c.border);
  g.appendChild(hdr);

  // Round bottom of header
  const hdrFix = document.createElementNS('http://www.w3.org/2000/svg','rect');
  hdrFix.setAttribute('y','20'); hdrFix.setAttribute('width',w);
  hdrFix.setAttribute('height','16'); hdrFix.setAttribute('fill',c.header);
  g.appendChild(hdrFix);

  const title = document.createElementNS('http://www.w3.org/2000/svg','text');
  title.setAttribute('x',w/2); title.setAttribute('y','23');
  title.setAttribute('text-anchor','middle'); title.setAttribute('fill',c.text);
  title.setAttribute('font-size','13'); title.setAttribute('font-weight','700');
  title.setAttribute('font-family','Segoe UI, sans-serif');
  title.textContent = ent.label;
  g.appendChild(title);

  // Divider
  const div = document.createElementNS('http://www.w3.org/2000/svg','line');
  div.setAttribute('x1','0'); div.setAttribute('y1',HEADER_H);
  div.setAttribute('x2',w); div.setAttribute('y2',HEADER_H);
  div.setAttribute('stroke',c.border); div.setAttribute('stroke-width','1');
  g.appendChild(div);

  ent.fields.forEach((f, i) => {
    const y = HEADER_H + 6 + i * FIELD_H + 14;
    const row = document.createElementNS('http://www.w3.org/2000/svg','g');

    if (f[2] || f[3]) {
      const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
      bg.setAttribute('x','4'); bg.setAttribute('y', HEADER_H + 4 + i*FIELD_H);
      bg.setAttribute('width', w-8); bg.setAttribute('height', FIELD_H-2);
      bg.setAttribute('rx','4');
      bg.setAttribute('fill', f[2] ? 'rgba(251,191,36,0.08)' : 'rgba(134,239,172,0.06)');
      g.appendChild(bg);
    }

    const badge = document.createElementNS('http://www.w3.org/2000/svg','text');
    badge.setAttribute('x', PADDING); badge.setAttribute('y', y);
    badge.setAttribute('font-size','9'); badge.setAttribute('font-weight','700');
    badge.setAttribute('font-family','monospace');
    if (f[2]) { badge.setAttribute('fill','#fbbf24'); badge.textContent = 'PK'; }
    else if (f[3]) { badge.setAttribute('fill','#86efac'); badge.textContent = 'FK'; }
    else { badge.setAttribute('fill','transparent'); badge.textContent = '  '; }
    row.appendChild(badge);

    const name = document.createElementNS('http://www.w3.org/2000/svg','text');
    name.setAttribute('x', PADDING + 22); name.setAttribute('y', y);
    name.setAttribute('font-size','11'); name.setAttribute('font-family','Segoe UI, sans-serif');
    name.setAttribute('fill', f[2] ? '#fef3c7' : f[3] ? '#d1fae5' : '#e2e8f0');
    name.textContent = f[0];
    row.appendChild(name);

    const type = document.createElementNS('http://www.w3.org/2000/svg','text');
    type.setAttribute('x', w - PADDING); type.setAttribute('y', y);
    type.setAttribute('text-anchor','end'); type.setAttribute('font-size','10');
    type.setAttribute('font-family','monospace'); type.setAttribute('fill','#64748b');
    type.textContent = f[1];
    row.appendChild(type);

    g.appendChild(row);
  });

  entityData[ent.id] = { x: ent.x, y: ent.y, w, h };
  entityEls[ent.id] = g;
  return g;
}

function getCenter(id) {
  const d = entityData[id];
  return { cx: d.x + d.w/2, cy: d.y + d.h/2, x: d.x, y: d.y, w: d.w, h: d.h };
}

function drawLines() {
  const linesG = document.getElementById('lines');
  linesG.innerHTML = '';
  RELATIONS.forEach(([from, to, label, color]) => {
    const a = getCenter(from);
    const b = getCenter(to);
    if (!a || !b) return;

    const dx = b.cx - a.cx;
    const dy = b.cy - a.cy;

    // Determine edge points
    let x1, y1, x2, y2;
    if (Math.abs(dx) > Math.abs(dy)) {
      x1 = dx > 0 ? a.x + a.w : a.x; y1 = a.cy;
      x2 = dx > 0 ? b.x : b.x + b.w; y2 = b.cy;
    } else {
      x1 = a.cx; y1 = dy > 0 ? a.y + a.h : a.y;
      x2 = b.cx; y2 = dy > 0 ? b.y : b.y + b.h;
    }

    const mx = (x1+x2)/2, my = (y1+y2)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','rel-line');
    path.setAttribute('stroke', color);
    path.setAttribute('marker-end','url(#arr)');
    path.setAttribute('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    linesG.appendChild(path);

    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x', mx); lbl.setAttribute('y', (y1+y2)/2 - 4);
    lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('fill', color);
    lbl.setAttribute('font-size','10'); lbl.setAttribute('font-family','monospace');
    lbl.setAttribute('font-weight','700');
    lbl.textContent = label;
    linesG.appendChild(lbl);
  });
}

// Build all
const entG = document.getElementById('entities');
ENTITIES.forEach(ent => entG.appendChild(buildEntity(ent)));
drawLines();

// Drag entity
let dragging = null, dragOffX = 0, dragOffY = 0;
let viewX = 0, viewY = 0, scale = 0.75;
let panning = false, panStartX, panStartY, panViewX, panViewY;

const svg = document.getElementById('erd');
const wrap = document.getElementById('canvas-wrap');

function applyView() {
  svg.style.transform = `translate(${viewX}px,${viewY}px) scale(${scale})`;
  svg.style.transformOrigin = '0 0';
}
applyView();

document.querySelectorAll('.entity').forEach(g => {
  g.addEventListener('mousedown', e => {
    e.stopPropagation();
    dragging = g;
    const t = new DOMMatrix(g.getAttribute('transform') || 'translate(0,0)');
    dragOffX = e.clientX / scale - t.e;
    dragOffY = e.clientY / scale - t.f;
    g.style.cursor = 'grabbing';
  });
});

wrap.addEventListener('mousedown', e => {
  if (!dragging) {
    panning = true;
    wrap.classList.add('grabbing');
    panStartX = e.clientX; panStartY = e.clientY;
    panViewX = viewX; panViewY = viewY;
  }
});

window.addEventListener('mousemove', e => {
  if (dragging) {
    const nx = e.clientX / scale - dragOffX;
    const ny = e.clientY / scale - dragOffY;
    dragging.setAttribute('transform', `translate(${nx},${ny})`);
    const id = dragging.dataset.id;
    entityData[id].x = nx; entityData[id].y = ny;
    drawLines();
  } else if (panning) {
    viewX = panViewX + (e.clientX - panStartX);
    viewY = panViewY + (e.clientY - panStartY);
    applyView();
  }
});

window.addEventListener('mouseup', () => {
  if (dragging) { dragging.style.cursor = 'move'; dragging = null; }
  if (panning) { panning = false; wrap.classList.remove('grabbing'); }
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.min(2, Math.max(0.3, scale * delta));
  applyView();
}, { passive: false });

function resetView() { viewX = 0; viewY = 0; scale = 0.75; applyView(); }
</script>
</body>
</html>
